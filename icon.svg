<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">

  <!-- icon background -->
  <rect x="0" y="0" width="280" height="280" rx="52" fill="#05070d" stroke="#1c2d44" stroke-width="2"/>

  <!-- screen bezel -->
  <rect x="16" y="16" width="248" height="208" rx="10" fill="#0a1828" stroke="#1e3a5a" stroke-width="1.5"/>

  <!-- screen glass -->
  <rect x="23" y="23" width="234" height="194" rx="6" fill="#040c18"/>

  <!-- player territory cells -->
  <rect x="33"  y="33"  width="70" height="58" fill="#0d2336"/>
  <rect x="33"  y="91"  width="70" height="58" fill="#0d2336"/>
  <rect x="103" y="91"  width="70" height="58" fill="#0d2336"/>
  <rect x="33"  y="149" width="70" height="58" fill="#091a28"/>
  <rect x="103" y="149" width="70" height="58" fill="#071420"/>

  <!-- enemy territory cells -->
  <rect x="173" y="33"  width="70" height="58" fill="#0f0818"/>
  <rect x="173" y="91"  width="70" height="58" fill="#0f0818"/>
  <rect x="173" y="149" width="70" height="58" fill="#0f0818"/>

  <!-- target cell (row 0, col 1) -->
  <rect x="103" y="33" width="70" height="58" fill="#0b2e4e" stroke="#4fc3f7" stroke-width="2"/>

  <!-- crosshair — center (138, 62) -->
  <line x1="113" y1="62"  x2="163" y2="62"  stroke="#4fc3f7" stroke-width="2"/>
  <line x1="138" y1="42"  x2="138" y2="82"  stroke="#4fc3f7" stroke-width="2"/>
  <circle cx="138" cy="62" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- corner brackets on target cell -->
  <path d="M108,40 L108,33 L115,33" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M163,33 L170,33 L170,40" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M108,81 L108,88 L115,88" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M163,88 L170,88 L170,81" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-linecap="round"/>

  <!-- grid lines -->
  <line x1="33"  y1="33"  x2="33"  y2="207" stroke="#12284a" stroke-width="0.8"/>
  <line x1="103" y1="33"  x2="103" y2="207" stroke="#12284a" stroke-width="0.8"/>
  <line x1="173" y1="33"  x2="173" y2="207" stroke="#12284a" stroke-width="0.8"/>
  <line x1="243" y1="33"  x2="243" y2="207" stroke="#12284a" stroke-width="0.8"/>
  <line x1="33"  y1="33"  x2="243" y2="33"  stroke="#12284a" stroke-width="0.8"/>
  <line x1="33"  y1="91"  x2="243" y2="91"  stroke="#12284a" stroke-width="0.8"/>
  <line x1="33"  y1="149" x2="243" y2="149" stroke="#12284a" stroke-width="0.8"/>
  <line x1="33"  y1="207" x2="243" y2="207" stroke="#12284a" stroke-width="0.8"/>

  <!-- unit dots in player cells -->
  <circle cx="68"  cy="62"  r="9" fill="#4fc3f7" opacity="0.85"/>
  <circle cx="68"  cy="120" r="9" fill="#4fc3f7" opacity="0.85"/>
  <circle cx="138" cy="120" r="9" fill="#4fc3f7" opacity="0.85"/>
  <circle cx="68"  cy="178" r="8" fill="#4fc3f7" opacity="0.50"/>
  <circle cx="138" cy="178" r="8" fill="#4fc3f7" opacity="0.30"/>

  <!-- button row: 5 × 44px, gap 7px, starting x=16 -->
  <!-- btn 0: cyan -->
  <rect x="16"  y="228" width="44" height="32" rx="4" fill="#0a1e30" stroke="#1a3a58" stroke-width="1"/>
  <rect x="23"  y="234" width="30" height="20" rx="2" fill="#4fc3f7"/>

  <!-- btn 1: dark -->
  <rect x="67"  y="228" width="44" height="32" rx="4" fill="#050c18" stroke="#0a1830" stroke-width="1"/>

  <!-- btn 2: cyan -->
  <rect x="118" y="228" width="44" height="32" rx="4" fill="#0a1e30" stroke="#1a3a58" stroke-width="1"/>
  <rect x="125" y="234" width="30" height="20" rx="2" fill="#4fc3f7"/>

  <!-- btn 3: amber — the Falcon patch -->
  <rect x="169" y="228" width="44" height="32" rx="4" fill="#1a0e06" stroke="#3a2010" stroke-width="1"/>
  <rect x="176" y="234" width="30" height="20" rx="2" fill="#ffb74d"/>

  <!-- btn 4: cyan -->
  <rect x="220" y="228" width="44" height="32" rx="4" fill="#0a1e30" stroke="#1a3a58" stroke-width="1"/>
  <rect x="227" y="234" width="30" height="20" rx="2" fill="#4fc3f7"/>

</svg>
